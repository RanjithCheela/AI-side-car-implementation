server:
  port: 8081

spring:
  application:
    name: loan-origination-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/intent_firewall}
    username: ${SPRING_DATASOURCE_USERNAME:bfsi}
    password: ${SPRING_DATASOURCE_PASSWORD:bfsi_secret_2024}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: loan-origination-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL_IMMEDIATE

kafka:
  topics:
    loan-allowed: loan-allowed

logging:
  level:
    com.bfsi: INFO
    org.springframework.kafka: WARN

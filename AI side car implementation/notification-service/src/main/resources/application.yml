server:
  port: 8082

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL_IMMEDIATE

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html

kafka:
  topics:
    loan-notifications: loan-notifications

notification:
  from-email: ${SPRING_MAIL_USERNAME:noreply@bank.com}
  from-name: "BFSI Intent Firewall"
  fraud-team-emails: ${FRAUD_TEAM_EMAILS:fraud@bank.com}
  loan-ops-emails: ${LOAN_OPS_EMAILS:loanops@bank.com}
  branch-manager-email: ${BRANCH_MANAGER_EMAIL:manager@bank.com}
  compliance-email: ${COMPLIANCE_EMAIL:compliance@bank.com}

logging:
  level:
    com.bfsi: INFO
    org.springframework.kafka: WARN
    org.springframework.mail: DEBUG
